name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runner: windows-latest
          - target: macos
            runner: macos-latest
          - target: linux-x64
            runner: ubuntu-latest

    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v4

      - name: Checkout escalada-api
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/escalada-api
          token: ${{ secrets.ESCALADA_REPOS_TOKEN || github.token }}
          path: workspace/escalada-api

      - name: Checkout escalada-ui
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/escalada-ui
          token: ${{ secrets.ESCALADA_REPOS_TOKEN || github.token }}
          path: workspace/escalada-ui

      - name: Checkout escalada-core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/escalada-core
          token: ${{ secrets.ESCALADA_REPOS_TOKEN || github.token }}
          path: workspace/escalada-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workspace/escalada-ui/package-lock.json

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: workspace/escalada-api/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('workspace/escalada-api/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install API dependencies
        working-directory: workspace/escalada-api
        run: |
          poetry install --with dev
          poetry run pip install -e ../escalada-core
          poetry run pip install pyinstaller

      - name: Build release (orchestrator scripts)
        run: >
          python scripts/build_release.py
          --api-dir workspace/escalada-api
          --ui-dir workspace/escalada-ui
          --core-dir workspace/escalada-core
          --mode both
          --release-dir release/${{ matrix.target }}
        env:
          ESCALADA_PORT_MIN: "8000"
          ESCALADA_PORT_MAX: "8100"
          ESCALADA_SMOKE_NON_HARDWARE: "1"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release/${{ matrix.target }}
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/**/*
