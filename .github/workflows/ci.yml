name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  core-tests:
    name: Core Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: repos/escalada-core/.venv
          key: ${{ runner.os }}-core-poetry-${{ hashFiles('repos/escalada-core/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-core-poetry-

      - name: Install core dependencies
        working-directory: repos/escalada-core
        run: poetry install --with dev --no-root

      - name: Run core tests
        working-directory: repos/escalada-core
        run: poetry run pytest -q

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: repos/escalada-api/.venv
          key: ${{ runner.os }}-api-poetry-${{ hashFiles('repos/escalada-api/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-api-poetry-

      - name: Install API dependencies
        working-directory: repos/escalada-api
        run: |
          poetry install --with dev
          poetry run pip install -e ../escalada-core

      - name: Run API tests
        working-directory: repos/escalada-api
        run: poetry run pytest tests/ -q

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: repos/escalada-ui/package-lock.json

      - name: Install UI dependencies
        working-directory: repos/escalada-ui
        run: npm ci

      - name: Run UI tests
        working-directory: repos/escalada-ui
        run: npm test -- --run

      - name: Run UI build smoke test
        working-directory: repos/escalada-ui
        run: npm run smoke:build

  summary:
    name: CI Summary
    needs: [core-tests, api-tests, ui-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "Core Tests: ${{ needs.core-tests.result }}"
          echo "API Tests: ${{ needs.api-tests.result }}"
          echo "UI Tests: ${{ needs.ui-tests.result }}"

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
