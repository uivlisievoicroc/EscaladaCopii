name: Nightly Tests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  nightly-core-tests:
    name: Nightly Core Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-in-project: true

      - name: Install core dependencies
        working-directory: repos/escalada-core
        run: poetry install --with dev --no-root

      - name: Run core tests
        working-directory: repos/escalada-core
        run: poetry run pytest -q

  nightly-api-tests:
    name: Nightly API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-in-project: true

      - name: Install API dependencies
        working-directory: repos/escalada-api
        run: |
          poetry install --with dev
          poetry run pip install -e ../escalada-core

      - name: Run API tests
        working-directory: repos/escalada-api
        run: poetry run pytest tests/ -q

  nightly-ui-tests:
    name: Nightly UI Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: repos/escalada-ui/package-lock.json

      - name: Install UI dependencies
        working-directory: repos/escalada-ui
        run: npm ci

      - name: Run UI coverage
        working-directory: repos/escalada-ui
        run: npm test -- --run --coverage

      - name: Install Playwright browsers
        working-directory: repos/escalada-ui
        run: npx playwright install --with-deps chromium

      - name: Run UI E2E tests
        working-directory: repos/escalada-ui
        run: npx playwright test --reporter=html --timeout=60000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: repos/escalada-ui/playwright-report/
          retention-days: 30

  report:
    name: Nightly Summary
    needs: [nightly-core-tests, nightly-api-tests, nightly-ui-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "Core: ${{ needs.nightly-core-tests.result }}"
          echo "API: ${{ needs.nightly-api-tests.result }}"
          echo "UI: ${{ needs.nightly-ui-tests.result }}"
