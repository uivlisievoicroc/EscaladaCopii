name: Deploy

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-check:
    name: Deployment Check
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: repos/escalada-ui/package-lock.json

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-in-project: true

      - name: Install API dependencies
        working-directory: repos/escalada-api
        run: |
          poetry install --with dev
          poetry run pip install -e ../escalada-core

      - name: Install UI dependencies
        working-directory: repos/escalada-ui
        run: npm ci

      - name: Compile API sources
        working-directory: repos/escalada-api
        run: poetry run python -m compileall escalada

      - name: Build UI
        working-directory: repos/escalada-ui
        run: npm run build

  deployment-notes:
    name: Deployment Instructions
    needs: [deploy-check]
    runs-on: ubuntu-latest

    steps:
      - name: Deployment ready
        run: |
          echo "Monorepo build checks passed."
          echo "Build releases with scripts/build_release.py from the repo root."
